# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX is required by Compose, CameraX, Lifecycle and Material dependencies.
android.useAndroidX=true

# Avoid noisy resource class generation across modules.
android.nonTransitiveRClass=true

# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official

# Disable configuration cache for CI stability with Android Gradle Plugin tasks.
org.gradle.configuration-cache=false
