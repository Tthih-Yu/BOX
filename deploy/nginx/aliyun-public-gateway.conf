# 阿里云 47.103.94.109 上的 Nginx 配置
# 将公网 80 端口转发到 SSH 隧道在远端监听的 127.0.0.1:18080

upstream material_pull_tunnel {
    server 127.0.0.1:18080;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 47.103.94.109 _;

    client_max_body_size 30m;

    access_log /var/log/nginx/material-pull-public-access.log;
    error_log /var/log/nginx/material-pull-public-error.log;

    location / {
        proxy_pass http://material_pull_tunnel;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
